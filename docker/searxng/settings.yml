# SearXNG settings — self-hosted degoogled search
# Docs: https://docs.searxng.org/admin/settings/

use_default_settings: true

general:
  instance_name: "nixeko search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json

server:
  # Generate a real secret: openssl rand -hex 32
  secret_key: "change_this_to_a_random_secret"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: dark

# Engines — balanced mix of sources, no Google
engines:
  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: w
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: google
    engine: google
    shortcut: g
    disabled: true  # disabled — degoogled by default, enable if needed
